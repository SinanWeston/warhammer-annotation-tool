<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reference Image Review</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a14; color: #e0e0e0; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 280px; background: #10101e; border-right: 1px solid #1e1e3a; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid #1e1e3a; }
        .sidebar-header h1 { font-size: 1rem; color: #7eb8f7; margin-bottom: 4px; }
        .sidebar-header .stats { font-size: 0.78rem; color: #666; }
        .sidebar-header .stats span { color: #4ade80; font-weight: 600; }
        .faction-list { flex: 1; overflow-y: auto; padding: 8px; }

        .faction-group { margin-bottom: 4px; }
        .faction-btn { width: 100%; text-align: left; background: none; border: none; color: #ccc; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.82rem; display: flex; justify-content: space-between; align-items: center; }
        .faction-btn:hover { background: #1a1a2e; }
        .faction-btn.active { background: #1a1a3e; color: #7eb8f7; }
        .faction-btn .badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 10px; }
        .badge-complete { background: #065f46; color: #4ade80; }
        .badge-partial { background: #3b2e10; color: #f59e0b; }
        .badge-empty { background: #2a1215; color: #f87171; }

        .unit-list { padding: 2px 0 2px 16px; }
        .unit-btn { width: 100%; text-align: left; background: none; border: none; color: #999; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.78rem; display: flex; justify-content: space-between; }
        .unit-btn:hover { background: #1a1a2e; color: #ccc; }
        .unit-btn.active { background: #1e2a4a; color: #7eb8f7; }
        .unit-btn .count { font-size: 0.72rem; color: #666; }

        /* Main content */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .toolbar { padding: 12px 20px; border-bottom: 1px solid #1e1e3a; display: flex; align-items: center; gap: 16px; background: #10101e; }
        .toolbar h2 { font-size: 0.95rem; color: #ccc; }
        .toolbar .info { font-size: 0.78rem; color: #666; }
        .toolbar .keys { font-size: 0.72rem; color: #555; margin-left: auto; }
        .toolbar .keys kbd { background: #1e1e3a; padding: 1px 6px; border-radius: 3px; border: 1px solid #2a2a4a; color: #888; }

        .content { flex: 1; overflow-y: auto; padding: 20px; }

        /* Image grids */
        .section-label { font-size: 0.8rem; color: #666; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; margin-top: 20px; }
        .section-label:first-child { margin-top: 0; }

        .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }

        .image-card { background: #12122a; border: 2px solid #1e1e3a; border-radius: 8px; overflow: hidden; transition: border-color 0.15s; position: relative; }
        .image-card:hover { border-color: #3a3a5a; }
        .image-card.selected { border-color: #7eb8f7; }
        .image-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; cursor: pointer; }
        .image-card .actions { display: flex; gap: 4px; padding: 6px; }
        .image-card .actions button { flex: 1; padding: 6px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.78rem; font-weight: 600; }
        .btn-accept { background: #065f46; color: #4ade80; }
        .btn-accept:hover { background: #047857; }
        .btn-reject { background: #450a0a; color: #f87171; }
        .btn-reject:hover { background: #7f1d1d; }

        .gallery-card { background: #0d1a0d; border: 2px solid #1a3a1a; border-radius: 8px; overflow: hidden; }
        .gallery-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
        .gallery-card .label { padding: 4px 8px; font-size: 0.72rem; color: #4ade80; text-align: center; }

        /* Empty state */
        .empty { text-align: center; padding: 60px 20px; color: #444; }
        .empty h3 { font-size: 1.1rem; margin-bottom: 8px; color: #555; }

        /* Lightbox */
        .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: none; align-items: center; justify-content: center; cursor: pointer; }
        .lightbox.visible { display: flex; }
        .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }

        /* Progress bar */
        .progress-bar { height: 4px; background: #1e1e3a; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .progress-bar .fill { height: 100%; background: linear-gradient(90deg, #4ade80, #22c55e); border-radius: 2px; transition: width 0.3s; }

        /* Loading */
        .loading { text-align: center; padding: 40px; color: #555; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h1>Reference Review</h1>
        <div class="stats">
            <span id="statsComplete">0</span>/<span id="statsTotal">0</span> units complete
            &middot; <span id="statsImages">0</span> accepted
        </div>
        <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="faction-list" id="factionList"></div>
</div>

<div class="main">
    <div class="toolbar">
        <h2 id="toolbarTitle">Select a unit</h2>
        <div class="info" id="toolbarInfo"></div>
        <div class="keys">
            <kbd>A</kbd> Accept &nbsp; <kbd>D</kbd> Reject &nbsp; <kbd>&larr;</kbd><kbd>&rarr;</kbd> Navigate &nbsp; <kbd>Enter</kbd> Zoom
        </div>
    </div>
    <div class="content" id="content">
        <div class="empty">
            <h3>Select a unit from the sidebar</h3>
            <p>Choose a faction, then a unit to review its candidate images.</p>
        </div>
    </div>
</div>

<div class="lightbox" id="lightbox">
    <img id="lightboxImg" src="" alt="">
</div>

<script>
const API = 'http://localhost:3001/api/references';
let coverageData = null;
let currentFaction = null;
let currentUnit = null;
let selectedCardIdx = -1;
let candidateCards = [];

async function fetchJSON(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
}

async function loadCoverage() {
    try {
        const res = await fetchJSON(`${API}/coverage`);
        coverageData = res.data;
        renderSidebar();
        updateStats();
    } catch (e) {
        document.getElementById('content').innerHTML =
            `<div class="empty"><h3>Could not load coverage data</h3>
             <p>Make sure the backend is running and coverage.json exists.</p>
             <p style="margin-top:12px;color:#f87171">python scripts/generate_coverage.py</p>
             <p style="color:#555;margin-top:8px">${e.message}</p></div>`;
    }
}

function updateStats() {
    if (!coverageData) return;
    document.getElementById('statsComplete').textContent = coverageData.completeUnits;
    document.getElementById('statsTotal').textContent = coverageData.totalUnits;
    document.getElementById('statsImages').textContent = coverageData.totalAccepted;
    const pct = coverageData.totalUnits > 0
        ? (coverageData.completeUnits / coverageData.totalUnits * 100).toFixed(1) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
}

function renderSidebar() {
    const container = document.getElementById('factionList');
    container.innerHTML = '';

    const factions = {};
    for (const u of coverageData.units) {
        if (!factions[u.faction]) factions[u.faction] = { display: u.factionDisplay, units: [] };
        factions[u.faction].units.push(u);
    }

    for (const [fkey, fdata] of Object.entries(factions)) {
        const complete = fdata.units.filter(u => u.complete).length;
        const total = fdata.units.length;
        const badgeClass = complete === total ? 'badge-complete' : complete > 0 ? 'badge-partial' : 'badge-empty';

        const group = document.createElement('div');
        group.className = 'faction-group';
        group.innerHTML = `
            <button class="faction-btn ${currentFaction === fkey ? 'active' : ''}" data-faction="${fkey}">
                ${fdata.display}
                <span class="badge ${badgeClass}">${complete}/${total}</span>
            </button>
            <div class="unit-list" style="display:${currentFaction === fkey ? 'block' : 'none'}">
                ${fdata.units.map(u => `
                    <button class="unit-btn ${currentUnit === u.slug ? 'active' : ''}"
                            data-faction="${fkey}" data-unit="${u.slug}">
                        ${u.name}
                        <span class="count">${u.accepted}/${u.target}</span>
                    </button>
                `).join('')}
            </div>
        `;
        container.appendChild(group);
    }

    // Faction expand/collapse
    container.querySelectorAll('.faction-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const fkey = btn.dataset.faction;
            if (currentFaction === fkey) {
                currentFaction = null;
            } else {
                currentFaction = fkey;
            }
            renderSidebar();
        });
    });

    // Unit selection
    container.querySelectorAll('.unit-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentFaction = btn.dataset.faction;
            currentUnit = btn.dataset.unit;
            renderSidebar();
            loadUnit(btn.dataset.faction, btn.dataset.unit);
        });
    });
}

async function loadUnit(faction, unit) {
    const content = document.getElementById('content');
    const unitData = coverageData.units.find(u => u.faction === faction && u.slug === unit);

    document.getElementById('toolbarTitle').textContent = `${unitData.factionDisplay} / ${unitData.name}`;
    document.getElementById('toolbarInfo').textContent =
        `${unitData.accepted}/${unitData.target} accepted, ${unitData.candidates} candidates`;

    content.innerHTML = '<div class="loading">Loading images...</div>';

    try {
        const [candidatesRes, galleryRes] = await Promise.all([
            fetchJSON(`${API}/candidates/${faction}/${unit}`),
            fetchJSON(`${API}/gallery/${faction}/${unit}`),
        ]);

        const candidates = candidatesRes.data.images;
        const gallery = galleryRes.data.images;

        let html = '';

        // Gallery (already accepted)
        if (gallery.length > 0) {
            html += `<div class="section-label">Accepted (${gallery.length}/${unitData.target})</div>`;
            html += '<div class="image-grid">';
            for (const img of gallery) {
                html += `
                    <div class="gallery-card">
                        <img src="${API}/image/gallery/${faction}/${unit}/${img}"
                             alt="${img}" loading="lazy"
                             onclick="showLightbox(this.src)">
                        <div class="label">${img}</div>
                    </div>`;
            }
            html += '</div>';
        }

        // Candidates
        if (candidates.length > 0) {
            html += `<div class="section-label">Candidates (${candidates.length} to review)</div>`;
            html += '<div class="image-grid">';
            for (let i = 0; i < candidates.length; i++) {
                const img = candidates[i];
                html += `
                    <div class="image-card" data-idx="${i}" data-filename="${img}">
                        <img src="${API}/image/candidates/${faction}/${unit}/${img}"
                             alt="${img}" loading="lazy"
                             onclick="showLightbox(this.src)">
                        <div class="actions">
                            <button class="btn-accept" onclick="reviewImage('${faction}','${unit}','${img}','accept',this)">Accept</button>
                            <button class="btn-reject" onclick="reviewImage('${faction}','${unit}','${img}','reject',this)">Reject</button>
                        </div>
                    </div>`;
            }
            html += '</div>';
        }

        if (candidates.length === 0 && gallery.length === 0) {
            html = `<div class="empty"><h3>No images yet</h3>
                     <p>Run the scraper to collect candidates:</p>
                     <p style="margin-top:8px;color:#7eb8f7">python scripts/collect_unit_images.py --faction ${faction} --unit ${unit}</p></div>`;
        } else if (candidates.length === 0) {
            html += `<div class="empty" style="padding:30px"><h3>No more candidates</h3>
                      <p>All candidates reviewed. Run the scraper for more if needed.</p></div>`;
        }

        content.innerHTML = html;
        candidateCards = content.querySelectorAll('.image-card');
        selectedCardIdx = candidateCards.length > 0 ? 0 : -1;
        updateCardSelection();
    } catch (e) {
        content.innerHTML = `<div class="empty"><h3>Error loading images</h3><p>${e.message}</p></div>`;
    }
}

async function reviewImage(faction, unit, filename, action, btnEl) {
    const card = btnEl.closest('.image-card');
    card.style.opacity = '0.3';
    card.style.pointerEvents = 'none';

    try {
        await fetch(`${API}/${action}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ faction, unit, filename }),
        });

        // Remove card with animation
        card.style.transition = 'all 0.3s';
        card.style.transform = 'scale(0.8)';
        card.style.opacity = '0';
        setTimeout(() => {
            card.remove();
            candidateCards = document.querySelectorAll('.image-card');
            if (selectedCardIdx >= candidateCards.length) {
                selectedCardIdx = candidateCards.length - 1;
            }
            updateCardSelection();
        }, 300);

        // Refresh coverage data
        const res = await fetchJSON(`${API}/coverage`);
        coverageData = res.data;
        updateStats();
        renderSidebar();

        const unitData = coverageData.units.find(u => u.faction === faction && u.slug === unit);
        if (unitData) {
            document.getElementById('toolbarInfo').textContent =
                `${unitData.accepted}/${unitData.target} accepted, ${unitData.candidates} candidates`;
        }
    } catch (e) {
        card.style.opacity = '1';
        card.style.pointerEvents = '';
        console.error('Review failed:', e);
    }
}

function updateCardSelection() {
    candidateCards.forEach((c, i) => {
        c.classList.toggle('selected', i === selectedCardIdx);
    });
    if (selectedCardIdx >= 0 && candidateCards[selectedCardIdx]) {
        candidateCards[selectedCardIdx].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
}

function showLightbox(src) {
    const lb = document.getElementById('lightbox');
    document.getElementById('lightboxImg').src = src;
    lb.classList.add('visible');
}

document.getElementById('lightbox').addEventListener('click', () => {
    document.getElementById('lightbox').classList.remove('visible');
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    // Close lightbox
    if (e.key === 'Escape') {
        document.getElementById('lightbox').classList.remove('visible');
        return;
    }

    if (!candidateCards.length || selectedCardIdx < 0) return;
    const card = candidateCards[selectedCardIdx];
    if (!card) return;

    const faction = card.dataset.faction || currentFaction;
    const unit = card.dataset.unit || currentUnit;
    const filename = card.dataset.filename;

    if (e.key === 'a' || e.key === 'A') {
        e.preventDefault();
        card.querySelector('.btn-accept').click();
    } else if (e.key === 'd' || e.key === 'D') {
        e.preventDefault();
        card.querySelector('.btn-reject').click();
    } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        selectedCardIdx = Math.min(selectedCardIdx + 1, candidateCards.length - 1);
        updateCardSelection();
    } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        selectedCardIdx = Math.max(selectedCardIdx - 1, 0);
        updateCardSelection();
    } else if (e.key === 'Enter') {
        e.preventDefault();
        const img = card.querySelector('img');
        if (img) showLightbox(img.src);
    }
});

// Init
loadCoverage();
</script>
</body>
</html>
