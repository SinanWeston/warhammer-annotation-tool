name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ts:
    name: TS typecheck + backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Typecheck (backend)
        run: cd backend && npx tsc --noEmit

      - name: Typecheck (frontend)
        run: cd frontend && npx tsc --noEmit

      - name: Typecheck (consumer)
        run: cd consumer && npx tsc --noEmit

      - name: Typecheck (annotator-mobile)
        run: cd annotator-mobile && npx tsc --noEmit

      - name: Backend tests (Vitest)
        run: cd backend && npx vitest run

      # Frontend component tests are blocked by a jsdom/vitest dep conflict
      # (see TODO.md "Still outstanding"). Skipped in CI until that's fixed.

  python:
    name: Python dataset validator tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pytest
        run: pip install pytest

      - name: Run validator tests
        run: pytest scripts/test_validate_yolo_dataset.py -v
